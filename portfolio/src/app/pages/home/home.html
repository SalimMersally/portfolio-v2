@if (status() === 'loading') {
  <app-loading />
} @else {
  <app-introduction [profile]="data()!.profile" />
  <app-experience [experiences]="data()!.experiences" />
  <app-skills [groups]="data()!.skills" />
  <app-education [items]="data()!.education" />
  <app-projects [projects]="data()!.projects" />
  <app-books [books]="data()!.books" />
  <app-contact [profile]="data()!.profile" />
  <app-footer />
}
