<div class="drp-root">
  <div class="drp-controls">
    <button
      class="drp-trigger"
      [class.is-active]="hasValue()"
      [class.is-open]="isOpen()"
      [attr.aria-expanded]="isOpen()"
      (click)="toggle()"
    >
      <svg
        width="13"
        height="13"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        aria-hidden="true"
      >
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <line x1="16" y1="2" x2="16" y2="6" />
        <line x1="8" y1="2" x2="8" y2="6" />
        <line x1="3" y1="10" x2="21" y2="10" />
      </svg>
      <span>{{ label() }}</span>
      <span class="drp-action">
        @if (hasValue()) {
          <span class="drp-clear-x" (click)="clearAndStop($event)" aria-label="Clear date range">
            <svg
              width="8"
              height="8"
              viewBox="0 0 10 10"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <line x1="1" y1="1" x2="9" y2="9" />
              <line x1="9" y1="1" x2="1" y2="9" />
            </svg>
          </span>
        } @else {
          <svg
            class="drp-chevron"
            width="11"
            height="11"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            aria-hidden="true"
          >
            <polyline points="6 9 12 15 18 9" />
          </svg>
        }
      </span>
    </button>
  </div>

  @if (isOpen()) {
    <div class="drp-panel" [style.left]="panelLeft()">
      <!-- Month nav -->
      <div class="drp-nav">
        <button class="drp-nav-btn" (click)="prevMonth()" aria-label="Previous month">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <span class="drp-month-label">{{ viewLabel() }}</span>
        <button class="drp-nav-btn" (click)="nextMonth()" aria-label="Next month">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </button>
      </div>

      <!-- Calendar grid -->
      <div class="drp-grid">
        @for (wd of weekDays; track $index) {
          <span class="drp-weekday">{{ wd }}</span>
        }
        @for (day of calendarDays(); track day.iso) {
          <button
            class="drp-day"
            [class.day--other]="!day.current"
            [class.day--today]="day.today"
            [class.day--start]="isStart(day)"
            [class.day--end]="isEnd(day)"
            [class.day--in-range]="isInRange(day)"
            [class.day--single]="isSingle(day)"
            [class.day--preview]="!!pendingFrom()"
            (click)="clickDay(day.iso)"
            (mouseenter)="hoverDay(day.iso)"
          >
            {{ day.day }}
          </button>
        }
      </div>

      <!-- Footer: presets + clear -->
      <div class="drp-footer">
        <button
          class="drp-preset"
          [class.is-active]="activePreset() === 1"
          (click)="selectPreset(1)"
        >
          Past day
        </button>
        <button
          class="drp-preset"
          [class.is-active]="activePreset() === 7"
          (click)="selectPreset(7)"
        >
          Past week
        </button>
        <button
          class="drp-preset"
          [class.is-active]="activePreset() === 30"
          (click)="selectPreset(30)"
        >
          Past month
        </button>
        <button class="drp-footer-clear" [disabled]="!hasValue()" (click)="clear()">Clear</button>
      </div>
    </div>
  }
</div>
