<nav class="nav" [class.scrolled]="scrolled()">
  <div class="nav-inner container">
    <a routerLink="/" fragment="introduction" class="nav-logo" aria-label="Home">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="32" height="32" rx="6" fill="currentColor" fill-opacity="0.15" />
        <text
          x="1.5"
          y="16"
          dominant-baseline="central"
          font-family="'JetBrains Mono', monospace"
          font-weight="300"
          font-size="15"
          fill="currentColor"
        >
          &#123;
        </text>
        <text
          x="11"
          y="16"
          dominant-baseline="central"
          font-family="'Space Grotesk', sans-serif"
          font-weight="700"
          font-size="15"
          letter-spacing="-0.5"
          style="fill: var(--color-text)"
        >
          S
        </text>
        <text
          x="22"
          y="16"
          dominant-baseline="central"
          font-family="'JetBrains Mono', monospace"
          font-weight="300"
          font-size="15"
          fill="currentColor"
        >
          &#125;
        </text>
      </svg>
    </a>

    <ul class="nav-links" [class.open]="mobileOpen()">
      @for (section of sections; track section) {
        <li>
          <a
            routerLink="/"
            [fragment]="section"
            class="nav-link"
            [class.active]="activeSection() === section"
            (click)="closeMobile()"
            >{{ section | titlecase }}</a
          >
        </li>
      }
    </ul>

    <a
      routerLink="/blog"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: false }"
      class="nav-link nav-blog-link"
      (click)="closeMobile()"
      >Blog</a
    >

    <div class="nav-actions">
      <button
        class="nav-mobile-toggle"
        [class.open]="mobileOpen()"
        (click)="toggleMobile()"
        [attr.aria-expanded]="mobileOpen()"
        aria-label="Toggle menu"
      >
        <svg
          class="icon-hamburger"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
        <svg
          class="icon-x"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>

      <button class="theme-toggle" (click)="theme.toggleMode()" aria-label="Toggle dark/light mode">
        <!-- Sun (shown in dark mode) -->
        <svg
          class="icon-sun"
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <!-- Moon (shown in light mode) -->
        <svg
          class="icon-moon"
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>

    </div>
  </div>
</nav>
